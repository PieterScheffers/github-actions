name: "On Labeled PR"

# Runs on every label that is added to the PR. When the PR is to merge it into main
on:
  pull_request:
    branches:
      - main
    types:
      - labeled

jobs:
  on-labeled-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: echo "$GITHUB_CONTEXT"
